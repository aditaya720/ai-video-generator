<!DOCTYPE html>
<html>
<head>
<title>AI Generator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

input{
width:70%;
padding:12px;
font-size:18px;
}

button{
padding:12px 20px;
font-size:18px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
margin-top:10px;
}

#result{
margin-top:20px;
}

img{
margin-top:20px;
max-width:400px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>AI Image Generator</h1>

<p>Type prompt and generate AI image</p>

<input id="prompt" placeholder="beautiful girl walking in rain cinematic lighting">

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>

function generate(){

let prompt = document.getElementById("prompt").value;

fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:prompt})
})
.then(res=>res.json())
.then(data=>{

document.getElementById("result").innerHTML =
"<img src='"+data.image+"'/>";

})

}

</script>

</body>
</html>

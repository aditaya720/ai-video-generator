<!DOCTYPE html>
<html>

<head>

<title>AI Image Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
margin:0;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:90%;
padding:14px;
font-size:16px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:12px 25px;
font-size:18px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
margin-top:15px;
border-radius:8px;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:30px;
}

img{
margin-top:20px;
max-width:100%;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.loading{
margin-top:20px;
font-size:18px;
color:#38bdf8;
}

.error{
color:#ef4444;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Image Generator</h1>

<p>Type prompt and generate AI image</p>

<input id="prompt" placeholder="beautiful girl walking in rain cinematic lighting">

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

</div>

<script>

async function generate(){

let prompt = document.getElementById("prompt").value.trim();
let result = document.getElementById("result");

if(prompt.length === 0){
alert("Please enter prompt");
return;
}

result.innerHTML = "<div class='loading'>Generating image...</div>";

try{

let response = await fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:prompt})
});

if(!response.ok){
throw new Error("Server error");
}

let data = await response.json();

if(data.image){

let imageUrl = data.image + "?t=" + new Date().getTime();

result.innerHTML = "<img src='"+imageUrl+"' alt='AI Image' onerror=\"this.parentElement.innerHTML='<div class=error>Image load failed</div>'\">";

}else{

result.innerHTML = "<div class='error'>Image generation failed</div>";

}

}catch(e){

result.innerHTML = "<div class='error'>Server error</div>";

}

}

</script>

</body>
</html>
